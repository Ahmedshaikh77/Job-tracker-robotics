name: Check Jobs

on:
  schedule:
    - cron: '7,22,37,52 * * * *'   # ~every 15 min, offset from the top of the hour for reliability
  workflow_dispatch:               # allow manual triggering from the Actions tab
    inputs:
      seed:
        description: 'Seed mode: mark all current jobs as seen without alerting (use on first run)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run: do not send Telegram messages'
        type: boolean
        default: false

# Required to commit the updated state.json back to the repo
permissions:
  contents: write

# Only one run at a time; queue (don't cancel) so state commits don't collide
concurrency:
  group: check-jobs
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL: INFO
        run: |
          ARGS=""
          if [ "${{ inputs.seed }}" = "true" ]; then ARGS="$ARGS --seed"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m src.main $ARGS

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --quiet --staged; then
            echo "No state changes."
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — pulling latest and retrying..."
            git pull --rebase --autostash -X ours origin main || git rebase --abort
            sleep 2
          done
          echo "Failed to push after 5 attempts."
          exit 1