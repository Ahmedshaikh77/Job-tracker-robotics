# Job Tracker Config - ROBOTICS / MECHANICAL / MEDICAL-DEVICE profile
# ====================================================================
#
# Same engine as the DS/AI version - only this file differs.
# Targets robotics, mechanical, mechatronics, controls, embedded, and
# medical-device R&D roles for an early-career / new-grad candidate.
#
# Companies marked `enabled: false` need their ATS values verified.
# Use `python -m src.verify "Company Name"` to test before enabling.

max_workers: 12

# ---------------- FILTER ----------------
filter:
  min_score: 3
  require_location_match: true

  include_keywords:
    # Robotics core
    - robotics engineer
    - robotics software
    - robot
    - ros
    - ros 2
    - motion planning
    - manipulation
    - perception engineer
    - autonomy
    - autonomous
    - mechatronics
    - controls engineer
    - control systems
    - actuation
    # Mechanical
    - mechanical engineer
    - mechanical design
    - design engineer
    - product development engineer
    - r&d engineer
    - research and development
    - fea
    - dfm
    # Embedded / systems / sensors
    - embedded systems
    - embedded software
    - firmware
    - sensor integration
    - sensor systems
    - systems engineer
    - integration engineer
    - hardware engineer
    # Test / reliability / automation
    - test engineer
    - hardware test
    - reliability engineer
    - automation engineer
    - manufacturing engineer
    - applications engineer
    - field engineer
    - field robotics
    # Medical device / surgical / wearable
    - medical device
    - medical robotics
    - surgical robotics
    - wearable
    - rehabilitation
    - imaging hardware

  exclude_keywords:
    # Seniority disqualifiers (matched as whole words in title)
    - senior
    - sr
    - staff
    - principal
    - lead
    - director
    - manager
    - vp
    - head of
    - chief
    - fellow
    # Wrong job families
    - sales
    - account executive
    - recruiter
    - intern
    - internship
    - technician          # often non-degreed shop roles; remove if you want these
    - marketing

  # International-student safety net: disqualify roles that require
  # US citizenship / clearance / ITAR (common in aerospace & defense).
  # These usually appear in the description, so we check ANYWHERE.
  hard_exclude_anywhere:
    - security clearance
    - active clearance
    - ts/sci
    - secret clearance
    - top secret
    - must be a u.s. citizen
    - u.s. citizenship is required
    - us citizenship is required
    - u.s. citizenship required
    - itar
    - export control

  level_signals_positive:
    - new grad
    - new graduate
    - university grad
    - university graduate
    - early career
    - early-career
    - entry level
    - entry-level
    - associate engineer
    - "0-2 years"
    - "0 to 2 years"
    - "1-2 years"
    - "2026"
    - "2027"
    - masters
    - "master's"
    - recent graduate
    - rotational
    - graduate program

  locations:
    - united states
    - usa
    - "u.s."
    - " us "
    - " us,"
    - remote
    - new york
    - "ny,"
    - " ny "
    - new jersey
    - "nj,"
    - california
    - "ca,"
    - san francisco
    - bay area
    - sunnyvale
    - santa clara
    - san jose
    - mountain view
    - palo alto
    - boston
    - cambridge
    - "ma,"
    - waltham
    - seattle
    - redmond
    - "wa,"
    - austin
    - "tx,"
    - pittsburgh
    - "pa,"
    - minneapolis
    - minnesota
    - "mn,"        # Medtronic
    - michigan
    - "mi,"        # Stryker
    - indiana
    - "in,"        # Zimmer Biomet
    - colorado
    - "co,"
    - oregon
    - "or,"        # Agility Robotics

